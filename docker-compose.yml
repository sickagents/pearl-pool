version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pearl_pool
      POSTGRES_PASSWORD: pearl_pool_pass
      POSTGRES_DB: pearl_pool
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pearl_pool"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  pool:
    build: .
    command: /app/pool
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3360:3360"
      - "3361:3361"
      - "3362:3362"
    environment:
      PEARL_POOL_NODE_HOST: ${PEARL_NODE_HOST:-localhost}
      PEARL_POOL_NODE_PORT: ${PEARL_NODE_PORT:-44107}
      PEARL_POOL_NODE_RPCUSER: ${PEARL_NODE_USER}
      PEARL_POOL_NODE_RPCPASS: ${PEARL_NODE_PASS}
      PEARL_POOL_DATABASE_HOST: postgres
      PEARL_POOL_DATABASE_PASSWORD: pearl_pool_pass
      PEARL_POOL_REDIS_HOST: redis
    volumes:
      - ./config.yaml:/etc/pearl-pool/config.yaml:ro
    restart: unless-stopped

  payout:
    build: .
    command: /app/payout
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PEARL_POOL_NODE_HOST: ${PEARL_NODE_HOST:-localhost}
      PEARL_POOL_NODE_PORT: ${PEARL_NODE_PORT:-44107}
      PEARL_POOL_NODE_RPCUSER: ${PEARL_NODE_USER}
      PEARL_POOL_NODE_RPCPASS: ${PEARL_NODE_PASS}
      PEARL_POOL_DATABASE_HOST: postgres
      PEARL_POOL_DATABASE_PASSWORD: pearl_pool_pass
      PEARL_POOL_REDIS_HOST: redis
    volumes:
      - ./config.yaml:/etc/pearl-pool/config.yaml:ro
    restart: unless-stopped

  api:
    build: .
    command: /app/api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      PEARL_POOL_DATABASE_HOST: postgres
      PEARL_POOL_DATABASE_PASSWORD: pearl_pool_pass
      PEARL_POOL_REDIS_HOST: redis
    volumes:
      - ./config.yaml:/etc/pearl-pool/config.yaml:ro
    restart: unless-stopped

  blockworker:
    build: .
    command: /app/blockworker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PEARL_POOL_NODE_HOST: ${PEARL_NODE_HOST:-localhost}
      PEARL_POOL_NODE_PORT: ${PEARL_NODE_PORT:-44107}
      PEARL_POOL_NODE_RPCUSER: ${PEARL_NODE_USER}
      PEARL_POOL_NODE_RPCPASS: ${PEARL_NODE_PASS}
      PEARL_POOL_DATABASE_HOST: postgres
      PEARL_POOL_DATABASE_PASSWORD: pearl_pool_pass
      PEARL_POOL_REDIS_HOST: redis
    volumes:
      - ./config.yaml:/etc/pearl-pool/config.yaml:ro
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
